version: "3.9"

services:
  db:
    image: postgres:15
    container_name: learner-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: learner_db
    ports:
      - "5433:5432"      # host:container — matches DATABASE_URL in .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: